<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EECU Budget Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="header">
        <img src="eecu-logo.png" id="EECU-Logo">
        <h3>Budget Calculator</h3>
    </nav>


    <h3>Budget Calculator</h3>

    <main>
        <section class="inputs">
            <ul class="progressBar">
                <a href="Index.html"><button class="stepOne">1</button></a>
                <a href="Housing.html"><button class="stepTwo">2</button></a>
                <a href="Transportation.html"><button class="stepThree">3</button></a>
                <a href="Education.html"><button class="stepFour">4</button></a>
                <a href="Personal.html"><button class="stepFive">5</button></a>
                <a href="Savings.html"><button class="stepSix">6</button></a>
            </ul>
        </section>
        <section class="Piechart-legend">
            <div id="Pie-chart">
                <section class="Piechart">

                </section>
            </div>
        </section>

        <section class="income">
            <h2> Savings </h2>
            <form action="">
                <input type="text" placeholder="Emergency">
                <input type="text" placeholder="Intestments">
                <input type="text" placeholder="Retirement">
                <input type="text" placeholder="Add Custom Item">
                <button id="secondary-button">+ Add</button>
            </form>
        </section>
        <section class="right-side">
            <a href="Summary.html" id="primary-buttons">Review Financials</a>
        </section>
    </main>

</body>

</html>
