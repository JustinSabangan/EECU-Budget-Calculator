<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EECU Budget Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="header">
        <img src="images\eecu-logo.png" id="EECU-Logo">
        <h3>Budget Calculator</h3>
    </nav>

    <main>
        <section class="inputs">
            <div class="progressBar">
                <a href="Index.html" class="active"><button class="stepOne">1</button></a>
                <a href="Housing.html" class="active"><button class="stepTwo">2</button></a>
                <a href="Transportation.html" class="active"><button class="stepThree">3</button></a>
                <a href="Education.html" class="active"><button class="stepFour">4</button></a>
                <a href="Personal.html" class="active"><button class="stepFive">5</button></a>
                <a href="Savings.html"><button class="stepSix">6</button></a>
            </div>
        </section>
        <section class="bottom-side">
            <section class="Piechart-legend">
                <div id="Pie-chart">
                    <section class="Piechart">

                    </section>
                </div>
            </section>

            <section class="income">
                <h2> Personal </h2>
                <form action="">
                    <input type="text" placeholder="Groceries">
                    <input type="text" placeholder="Clothing">
                    <input type="text" placeholder="Entertainment">
                    <input type="text" placeholder="Medical">
                    <input type="text" placeholder="Add Custom Item">
                    <button id="secondary-button">+ Add</button>
                </form>
            </section>
            <section class="right-side">
                <a href="Savings.html" id="primary-buttons">Continue</a>
            </section>
        </section>


    </main>

</body>

</html>
