<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EECU Budget Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <img src="eecu-logo.png" id="EECU-Logo">
        <h3>Budget Calculator</h3>
    </nav>
    <main>
        <section class="inputs">
            <ul class="progressBar">
                <a href="Index.html"><button class="stepOne">1</button></a>
                <a href="Housing.html"><button class="stepTwo">2</button></a>
                <a href="Transportation.html"><button class="stepThree">3</button></a>
                <a href="Education.html"><button class="stepFour">4</button></a>
                <a href="Personal.html"><button class="stepFive">5</button></a>
                <a href="Savings.html"><button class="stepSix">6</button></a>
            </ul>
        </section>
        <section class="bottom-side">
            <section class="Piechart-legend">
                <div id="Pie-chart">
                    <section class="Piechart">

                    </section>
                </div>
            </section>

            <section class="income">
                <h2> Monthly Income</h2>
                <form id="income-form" action="">
                    <input id="GAI" type="text" placeholder="Gross Annual income">
                    <input id="CaSe" type="text" placeholder="Career Selection">
                    <input id="SaWa" type="text" placeholder="Salary/Wages">
                    <input id="SiIn" type="text" placeholder="Side Income">
                    <input id="Ben" type="text" placeholder="Benefits">
                    <input id="ACI" type="text" placeholder="Add Custom Item">
                    <button id="secondary-button">+ Add</button>
                </form>
            </section>
            <section class="right-side">
                <a href="Housing.html" id="primary-buttons">Continue</a>
            </section>
        </section>
    </main>


</body>

</html>
